services:
  db:
    image: postgres:16-alpine
    container_name: recommendation-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: recommendation_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d recommendation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recommendation-network

  app:
    build: .
    container_name: recommendation-engine
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/recommendation_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - recommendation-network

volumes:
  db_data:

networks:
  recommendation-network:
    driver: bridge