services:
  db:
    image: postgres:16-alpine
    container_name: route-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: route_db
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d route_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - route-network

  app:
    build: .
    container_name: route-engine
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/route_db
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - route-network

volumes:
  db_data:

networks:
  route-network:
    driver: bridge
